"$schema" = 'https://starship.rs/config-schema.json'

# Clean powerline-style prompt with modern tool indicators
format = """
[Óā∂](#9A348E)\
$os\
$username\
[Óāį](bg:#DA627D fg:#9A348E)\
$directory\
[Óāį](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[Óāį](fg:#FCA17D bg:#86BBD8)\
$nodejs\
$bun\
$golang\
$rust\
$python\
[Óāį](fg:#86BBD8 bg:#06969A)\
$docker_context\
[Óāį](fg:#06969A bg:#33658A)\
$time\
[Óāį ](fg:#33658A)\
"""

add_newline = true

[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'

[os]
style = "bg:#9A348E"
disabled = false

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė "
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[git_commit]
commit_hash_length = 7
tag_symbol = " ÔÄę "

[nodejs]
symbol = "Óúė "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "ÓĚĮ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "Óėß "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "Óě® "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "ÓąĶ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "ÔĆą "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A"
format = '[ ‚ô• $time ]($style)'

[cmd_duration]
min_time = 3000
format = " took [$duration](bold yellow)"
style = "yellow"

[status]
disabled = false
format = "[$symbol$status]($style)"
style = "red"
symbol = "‚úĖ"
success_symbol = ""
map_symbol = true
