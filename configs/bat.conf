# bat configuration

# Theme: Catppuccin Mocha (needs --theme to be available; run `bat --list-themes`)
--theme="Catppuccin Mocha"

# Show line numbers, grid, and header
--style="numbers,grid,header"

# Use italic text in supported terminals
--italic-text=always

# Syntax mappings
#--map-syntax "*.ino:C++"
#--map-syntax ".ignore:Git Ignore"
