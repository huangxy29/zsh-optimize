# =============================================================================
# Tmux Configuration — Modern & Optimized
# =============================================================================

# ---- Terminal & Color ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256color*:Tc"          # True color support
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q' # Proper cursor shape
set -g extended-keys on                                # Modern terminal key encoding
set -g extended-keys-format csi-u                      # Use CSI u format
set -g focus-events on
set -g mouse on

# ---- General Settings ----
set -g history-limit 50000          # Scrollback buffer size
set -g display-time 4000            # Message display duration (ms)
set -g escape-time 10               # Faster escape key response (vi-mode compat)
set -g repeat-time 300              # Repeat time for bindings (ms)
set -g base-index 1                 # Start window numbering at 1
setw -g pane-base-index 1           # Start pane numbering at 1
set -g renumber-windows on          # Auto-renumber windows when one closes
set -g set-titles on                # Set terminal title
set -g set-titles-string "#S / #W"  # session / window

# ---- Prefix Key (Ctrl-B, default) ----
# Kept as Ctrl-B for compatibility with zsh vi-mode (Ctrl-A = beginning-of-line)
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# ---- Vi-Style Copy Mode ----
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard; xclip -o > /tmp/tmux_copy.txt"

# ---- Split Panes ----
# Prefix + | → vertical split, Prefix + - → horizontal split
# (opens in the same directory as current pane)
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# ---- Pane Navigation (Prefix + h/j/k/l, vim-style) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick pane navigation without prefix (Alt + h/j/k/l)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ---- Pane Resizing ----
# Prefix + H/J/K/L → resize panes by 5 cells
# Prefix + Alt+arrows → resize panes by 5 cells
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ---- Window Management ----
# Prefix + c       → new window
# Prefix + ,       → rename window
# Prefix + &       → kill window
# Prefix + n/p     → next/previous window
# Prefix + 1-9     → switch to window by number
bind '"' split-window -c "#{pane_current_path}"    # legacy split
bind '%' split-window -h -c "#{pane_current_path}"  # legacy vsplit

# ---- Session Management ----
bind C-s choose-session    # Prefix + Ctrl+S → interactive session picker

# ---- Reload Config ----
bind r source-file ~/.tmux.conf \; display "✅ Config reloaded"

# ---- Status Bar Appearance ----
set -g status-interval 1
set -g status-position top

# ---- Plugins (TPM — Tmux Plugin Manager) ----
# Install plugins: launch tmux and press Prefix + I
# Update  plugins: launch tmux and press Prefix + U
# Remove  plugins: delete @plugin line, then Prefix + Alt + U

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin theme (Mocha flavor)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_pane_border_style 'fg=#45475a'
set -g @catppuccin_status_modules_right 'directory session user host date_time'
set -g @catppuccin_date_time_text '%H:%M'

# ---- Plugin Settings ----
# tmux-yank — system clipboard integration
set -g @yank_action 'copy-pipe-and-cancel'
set -g @yank_with_mouse on

# tmux-resurrect — session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# tmux-continuum — auto-save & restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ---- Initialize TPM (must be last) ----
run '~/.tmux/plugins/tpm/tpm'
